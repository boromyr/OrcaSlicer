on:
  workflow_call:
    inputs:
      cache-key:
        required: true
        type: string
      cache-path:
        required: true
        type: string
      valid-cache:
        required: true
        type: boolean
      build-deps-only:
        required: false
        type: boolean
        default: false

jobs:
  build_deps:
    name: Build Dependencies Windows
    if: inputs.build-deps-only || inputs.valid-cache != true
    runs-on: windows-latest
    env:
      date:
    steps:

      # Setup the environment
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: 'true'

      - name: Load cached dependencies
        uses: actions/cache@v4
        with:
          path: ${{ inputs.cache-path }}
          key: ${{ inputs.cache-key }}

      - name: Get CMake
        uses: lukka/get-cmake@latest
        with:
          cmakeVersion: "~3.28.0"  # use most recent 3.28.x version

      - name: Setup MSVC for Windows
        uses: microsoft/setup-msbuild@v2

      - name: Get build date
        run: echo "date=$(Get-Date -Format 'yyyyMMdd')" | Out-File -Append -FilePath $env:GITHUB_ENV -Encoding utf8
        shell: pwsh

      # Build Dependencies for Windows
      - name: Install Strawberry Perl
        run: choco install strawberryperl

      - name: Build Windows Dependencies
        working-directory: ${{ github.workspace }}
        run: |
            .\build_release_vs2022.bat deps
            .\build_release_vs2022.bat pack
            cd ${{ github.workspace }}/deps/build

      # Upload Windows Artifacts
      - name: Upload Windows Dependencies Artifact
        uses: actions/upload-artifact@v4
        with:
          name: OrcaSlicer_dep_win64_${{ env.date }}
          path: ${{ github.workspace }}/deps/build/OrcaSlicer_dep*.zip

  build_orca:
    name: Build OrcaSlicer Windows
    needs: [build_deps]
    if: ${{ !cancelled() && !inputs.build-deps-only && (inputs.valid-cache == true && needs.build_deps.result == 'skipped') || (inputs.valid-cache != true && success()) }}
    uses: ./.github/workflows/build_orca.yml
    with:
      cache-key: ${{ inputs.cache-key }}
      cache-path: ${{ inputs.cache-path }}
    secrets: inherit